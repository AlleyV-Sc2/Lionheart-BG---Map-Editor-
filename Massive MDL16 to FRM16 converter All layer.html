<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🦁 Lionheart MDL16 → FRM16 Batch Extractor (Fix)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --accent: #f39c12; --text: #e0e0e0; --dim: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: var(--accent); text-align: center; margin-bottom: 5px; font-size: 1.8em; }
        .subtitle { text-align: center; color: var(--dim); margin-bottom: 25px; font-size: 0.95em; }
        .panel { background: var(--panel); border: 1px solid #333; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .drop-zone { border: 3px dashed #444; border-radius: 12px; padding: 50px 20px; text-align: center; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: #1f1f1f; }
        .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .progress-bar-bg { background: #333; border-radius: 8px; height: 24px; overflow: hidden; position: relative; margin-top: 15px; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #e67e22); width: 0%; transition: width 0.3s ease; border-radius: 8px; }
        .progress-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.8em; font-weight: bold; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        .status-log { margin-top: 12px; font-family: monospace; font-size: 0.85em; color: var(--dim); max-height: 150px; overflow-y: auto; background: #111; padding: 10px; border-radius: 6px; line-height: 1.6; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 15px; }
        .stat-box { background: #111; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .stat-val { font-size: 1.6em; font-weight: bold; color: var(--accent); }
        .btn-download { background: linear-gradient(135deg, var(--accent), #e67e22); color: #000; border: none; padding: 15px 40px; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; width: 100%; margin-top: 20px; }
        .btn-download:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(243,156,18,0.4); }
        .btn-download:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; filter: grayscale(1); }
        .error-msg { color: #e74c3c; font-weight: bold; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>🦁 MDL16 → FRM16 Batch Extractor</h1>
    <p class="subtitle">Versión estable con manejo de memoria y desbloqueo de descargas</p>

    <div class="panel">
        <div class="drop-zone" id="dropZone">
            <input type="file" id="folderInput" webkitdirectory directory multiple accept=".mdl16">
            <span style="font-size: 3em; display: block; margin-bottom: 15px;">📂</span>
            <div style="font-size: 1.2em; font-weight: 600; color: var(--accent);">Selecciona la carpeta «Environments»</div>
            <div style="color: var(--dim); margin-top: 8px; font-size: 0.9em;">Se procesarán recursivamente todos los archivos .mdl16</div>
        </div>

        <div id="progressSection" style="display:none;">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            <div class="stats">
                <div class="stat-box"><div class="stat-val" id="statModels">0</div><div class="stat-label">Modelos</div></div>
                <div class="stat-box"><div class="stat-val" id="statFrms">0</div><div class="stat-label">FRM16</div></div>
                <div class="stat-box"><div class="stat-val" id="statErrors">0</div><div class="stat-label">Errores</div></div>
            </div>
            <div class="status-log" id="statusLog"></div>
            <div class="error-msg" id="errorMsg"></div>
            <button class="btn-download" id="downloadBtn" disabled>💾 Generar y Descargar ZIP</button>
        </div>
    </div>
</div>

<script>
let extractedFiles = []; // Almacenamos {name, data} en lugar de un ZIP gigante en memoria
let isProcessing = false;

const folderInput = document.getElementById('folderInput');
const progressSection = document.getElementById('progressSection');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const statusLog = document.getElementById('statusLog');
const downloadBtn = document.getElementById('downloadBtn');
const errorMsg = document.getElementById('errorMsg');

folderInput.addEventListener('change', async e => {
    const files = Array.from(e.target.files).filter(f => f.name.toLowerCase().endsWith('.mdl16'));
    if (files.length === 0) { log('❌ No se encontraron archivos .mdl16', 'error'); return; }
    await processAllFiles(files);
});

function log(msg, type = '') {
    const div = document.createElement('div');
    div.className = type;
    div.textContent = msg;
    statusLog.appendChild(div);
    statusLog.scrollTop = statusLog.scrollHeight;
}

async function processAllFiles(files) {
    if (isProcessing) return;
    isProcessing = true;
    extractedFiles = []; // Limpiar extracciones anteriores
    
    progressSection.style.display = 'block';
    downloadBtn.disabled = true;
    downloadBtn.textContent = '⏳ Procesando archivos...';
    errorMsg.style.display = 'none';
    statusLog.innerHTML = '';
    
    let processed = 0, frms = 0, errors = 0;
    const total = files.length;

    for (const file of files) {
        try {
            const buffer = await file.arrayBuffer();
            const data = new Uint8Array(buffer);
            const relPath = file.webkitRelativePath || file.name;
            const baseName = relPath.replace(/\.mdl16$/i, '');
            
            const frmsFound = extractFrm16s(data);
            
            if (frmsFound.length === 0) {
                errors++;
            } else {
                frmsFound.forEach((frmData, idx) => {
                    extractedFiles.push({
                        name: `${baseName}_frm${idx}.frm16`,
                        data: frmData
                    });
                    frms++;
                });
            }
        } catch (err) {
            log(`❌ ${file.name}: ${err.message}`, 'error');
            errors++;
        }
        
        processed++;
        const pct = Math.round((processed / total) * 100);
        progressBar.style.width = pct + '%';
        progressText.textContent = `${pct}% (${processed}/${total})`;
        document.getElementById('statModels').textContent = total;
        document.getElementById('statFrms').textContent = frms;
        document.getElementById('statErrors').textContent = errors;
        
        // Ceder control al navegador cada 5 archivos para evitar congelamiento
        if (processed % 5 === 0) await new Promise(r => setTimeout(r, 0));
    }

    isProcessing = false;
    log(`✅ Extracción completada: ${frms} FRM16 listos para empaquetar`);
    
    if (extractedFiles.length > 0) {
        downloadBtn.disabled = false;
        downloadBtn.textContent = `💾 Descargar ZIP (${extractedFiles.length} archivos)`;
    } else {
        downloadBtn.textContent = '❌ Sin archivos para descargar';
        errorMsg.textContent = 'No se pudo extraer ningún FRM16 válido.';
        errorMsg.style.display = 'block';
    }
}

function extractFrm16s(data) {
    const results = [];
    const sig = [0x01, 0x32, 0x10];
    let pos = 0;
    
    while (pos <= data.length - sig.length) {
        if (data[pos] === sig[0] && data[pos+1] === sig[1] && data[pos+2] === sig[2]) {
            if (pos + 32 <= data.length) {
                let nextSig = data.length;
                for (let j = pos + 32; j <= data.length - sig.length; j++) {
                    if (data[j] === sig[0] && data[j+1] === sig[1] && data[j+2] === sig[2]) {
                        nextSig = j;
                        break;
                    }
                }
                const frmSize = nextSig - pos;
                if (frmSize > 32 && frmSize < 50 * 1024 * 1024) {
                    results.push(data.slice(pos, nextSig));
                }
                pos = nextSig;
            } else { pos++; }
        } else { pos++; }
    }
    return results;
}

// DESCARGA SEGURA CON MANEJO DE ERRORES Y STREAMING
downloadBtn.addEventListener('click', async () => {
    if (extractedFiles.length === 0) return;
    
    downloadBtn.disabled = true;
    downloadBtn.textContent = '📦 Empaquetando ZIP...';
    errorMsg.style.display = 'none';
    
    try {
        const zip = new JSZip();
        
        // Añadir archivos en lotes para no saturar la memoria
        const BATCH_SIZE = 50;
        for (let i = 0; i < extractedFiles.length; i += BATCH_SIZE) {
            const batch = extractedFiles.slice(i, i + BATCH_SIZE);
            batch.forEach(file => zip.file(file.name, file.data));
            await new Promise(r => setTimeout(r, 0)); // Respirar entre lotes
        }
        
        downloadBtn.textContent = '💾 Generando archivo final...';
        
        // Generar con streaming para archivos grandes
        const blob = await zip.generateAsync(
            { 
                type: 'blob',
                compression: 'STORE', // STORE es más rápido y usa menos memoria que DEFLATE
                streamFiles: true     // Clave para evitar bloqueos en archivos grandes
            },
            (metadata) => {
                // Callback de progreso de compresión
                const pct = Math.round(metadata.percent);
                progressBar.style.width = pct + '%';
                progressText.textContent = `Empaquetando: ${pct}%`;
            }
        );
        
        // Forzar descarga con revokeObjectURL diferido
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Lionheart_FRM16_Extracted.zip';
        document.body.appendChild(a);
        a.click();
        
        // Limpieza segura después de iniciar la descarga
        setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            downloadBtn.textContent = `✅ ¡Descarga iniciada! (${extractedFiles.length} archivos)`;
            setTimeout(() => {
                downloadBtn.disabled = false;
                downloadBtn.textContent = `💾 Descargar ZIP (${extractedFiles.length} archivos)`;
            }, 3000);
        }, 1000);
        
    } catch (err) {
        console.error(err);
        downloadBtn.disabled = false;
        downloadBtn.textContent = `💾 Reintentar Descarga`;
        errorMsg.textContent = `Error al generar ZIP: ${err.message}. Prueba con menos archivos o cierra otras pestañas.`;
        errorMsg.style.display = 'block';
        log(`❌ Error ZIP: ${err.message}`, 'error');
    }
});
</script>
</body>
</html>
